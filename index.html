<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC Bích Ngân | Ultra-Luxury Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Dancing+Script:wght@400;600;700&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./cinematic.css">
</head>

<body>

  <!-- ═══════ CURTAIN INTRO ANIMATION ═══════ -->
  <div id="curtain-scene">
    <div id="overlay-black"></div>
    <div id="curtain-glow"></div>
    <div id="curtain-left" class="curtain-leaf"></div>
    <div id="curtain-right" class="curtain-leaf"></div>
  </div>

  <!-- ═══════ GLOBAL GLITTER EFFECT ═══════ -->
  <div id="global-glitter">
    <div class="glitter-layer-1"></div>
    <div class="glitter-layer-2"></div>
    <div class="glitter-layer-3"></div>
  </div>

  <!-- Placeholders for dynamically imported sections -->
  <div id="section-1-hero"></div>
  <div id="section-2-profile"></div>
  <div id="section-7b-lookbook"></div>
  <div id="section-2b-education"></div>
  <div id="section-2c-why-me"></div>
  <div id="section-3-testimonials-video"></div>
  <div id="section-4a-testimonials-image"></div>
  <div id="section-4b-testimonials-image"></div>
  <div id="section-5a-event-expertise"></div>
  <div id="section-5b-event-expertise"></div>
  <div id="section-5c-event-expertise"></div>
  <div id="section-6a-stage-moments"></div>
  <div id="section-6b-stage-moments"></div>
  <div id="section-6c-stage-moments"></div>
  <div id="section-8-featured-projects"></div>
  <div id="section-7-partners-footer"></div>

  <!-- Scroll to Top Button -->
  <button id="scrollToTopBtn" class="scroll-to-top" aria-label="Scroll to Top">
    ↑
  </button>

  <!-- JavaScript to import HTML fragments -->
  <script>
    async function loadSection(containerId, filePath) {
      try {
        const response = await fetch(filePath);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const html = await response.text();
        document.getElementById(containerId).innerHTML = html;
      } catch (error) {
        console.error(`Failed to load ${filePath}:`, error);
        document.getElementById(containerId).innerHTML = `
          <div style="padding: 2rem; text-align: center; color: red; background: #111;">
            <p><strong>Error loading section: ${filePath}</strong></p>
            <p>If you are opening this file directly (file://), your browser is blocking the request due to CORS policy.</p>
            <p>Please open the project using a local server (e.g., VS Code Live Server).</p>
          </div>
        `;
      }
    }

    async function initializePortfolio() {
      // Load all main sections concurrently for maximum performance
      const sectionPromises = [
        loadSection('section-1-hero', './src/sections/1-hero.html'),
        loadSection('section-2-profile', './src/sections/2-profile.html'),
        loadSection('section-2b-education', './src/sections/2b-education.html'),
        loadSection('section-7b-lookbook', './src/sections/7b-lookbook.html'),
        loadSection('section-2c-why-me', './src/sections/2c-why-me.html'),
        loadSection('section-3-testimonials-video', './src/sections/3-testimonials-video.html'),
        loadSection('section-4a-testimonials-image', './src/sections/4a-testimonials-image.html'),
        loadSection('section-5a-event-expertise', './src/sections/5a-event-expertise.html'),
        loadSection('section-5b-event-expertise', './src/sections/5b-event-expertise.html'),
        loadSection('section-5c-event-expertise', './src/sections/5c-event-expertise.html'),
        loadSection('section-6a-stage-moments', './src/sections/6a-stage-moments.html'),
        loadSection('section-6b-stage-moments', './src/sections/6b-stage-moments.html'),
        loadSection('section-6c-stage-moments', './src/sections/6c-stage-moments.html'),
        loadSection('section-8-featured-projects', './src/sections/8-featured-projects.html'),
        loadSection('section-7-partners-footer', './src/sections/7-partners-footer.html')
      ];

      await Promise.all(sectionPromises);

      // Load 20 featured project components concurrently
      const projectFiles = [
        'project-01.html',
        'project-02.html',
        'project-03.html',
        'project-04.html',
        'project-05.html',
        'project-06.html',
        'project-07.html',
        'project-08.html',
        'project-09.html',
        'project-10.html',
        'project-11.html',
        'project-12.html',
        'project-13.html',
        'project-14.html',
        'project-15.html',
        'project-16.html',
        'project-17.html',
        'project-18.html',
        'project-19.html',
        'project-20.html'
      ];
      
      const projectsContainer = document.getElementById('featured-projects-list');
      if (projectsContainer) {
        try {
          const projectPromises = projectFiles.map(file => 
            fetch('./src/components/projects/' + file).then(res => res.ok ? res.text() : '')
          );
          const projectHtmls = await Promise.all(projectPromises);
          projectsContainer.insertAdjacentHTML('beforeend', projectHtmls.join(''));
        } catch (e) {
          console.error('Failed to load projects concurrently', e);
        }
      }

      console.log('All sections imported successfully!');

      // Trigger curtain intro animation after content is ready
      const curtainScript = document.createElement('script');
      curtainScript.src = './curtain.js';
      document.body.appendChild(curtainScript);

      // Load additional scripts
      const fadeScript = document.createElement('script');
      fadeScript.src = './script.js';
      document.body.appendChild(fadeScript);
    }

    initializePortfolio();
  </script>

</body>

</html>
